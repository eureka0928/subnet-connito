# Connito SN102 validator + Watchtower auto-updater.
#
# This compose file lives at connito/validator/docker/docker-compose.yml.
# Run from this directory:
#
#   python connito/shared/config.py create_config --role validator ...
#   cd connito/validator/docker
#   docker compose up -d
#
# - `validator`  runs the containerized validator built from this repo.
# - `watchtower` polls the registry for new tags of the validator image
#   and restarts the container in place when one appears.
#
# See ../../docs/validator-docker-operators.md for the full host setup
# checklist (NVIDIA Container Toolkit, wallet bind mount, registry auth,
# etc). Miners do NOT use this stack — only validators are containerized.

services:
  validator:
    # Pulled from GHCR by default. `:stable` only moves when maintainers
    # cut a release (`git tag vX.Y.Z`) — Watchtower auto-upgrades when it
    # does. Override with `IMAGE=...` in .env to track `:staging`, pin to
    # a specific `vX.Y.Z`, or freeze on a `master-<sha>` build artifact.
    image: ${IMAGE:-ghcr.io/connito-ai/connito-validator:stable}
    # container_name removed — derived from COMPOSE_PROJECT_NAME so
    # multiple instances can run on the same host.
    restart: unless-stopped
    pull_policy: always
    # Inject /sbin/docker-init (tini) as PID 1 so SIGTERM is forwarded
    # to the validator process and orphaned children are reaped. Without
    # this, the validator (CPython) runs as PID 1, which doesn't reap
    # zombies — Watchtower's stop-and-replace upgrade then fails with
    # "PID <n> is zombie and can not be killed", leaving a half-dead
    # container that blocks the next deploy.
    init: true

    # Local development build. Production deploys pull from the registry
    # and ignore this section, but `docker compose build` from this dir
    # will rebuild the image against the live source tree.
    build:
      context: ../../..
      dockerfile: connito/validator/docker/Dockerfile

    # Watchtower watches for this label so it only touches containers we
    # explicitly opt in. Other containers on the host are left alone.
    labels:
      com.centurylinklabs.watchtower.enable: "true"

    # Host networking keeps the hivemind DHT, chain serve port, and
    # Prometheus telemetry endpoint reachable on the host's public IP
    # without per-port NAT — same pattern as observability/docker-compose.yml.
    network_mode: "host"

    # NVIDIA GPU access. Requires nvidia-container-toolkit on the host.
    # Set VALIDATOR_GPU_ID in .env to pin to a specific GPU (e.g. "4").
    # Defaults to all GPUs if not set.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VALIDATOR_GPU_ID:-0}"]
              capabilities: [gpu]

    # Shared memory for PyTorch DataLoader workers and hivemind averager buffers.
    # ipc: host removed — with host IPC, crashed containers leak torch shm files
    # onto the host /dev/shm permanently (owned by root, never cleaned up).
    # Private IPC (the default) gives each container its own tmpfs that Docker
    # wipes on exit, even on crash.
    # Override SHM_SIZE in .env if your host has less RAM (minimum ~8gb).
    shm_size: ${SHM_SIZE:-64gb}

    # Clean up any leftover torch shm files from a previous run (migration
    # safety net for hosts that previously used ipc: host), then hand off
    # to the normal entrypoint.
    entrypoint: ["/bin/sh", "-c", "rm -f /dev/shm/torch_* && exec python -m connito.validator.run \"$@\"", "--"]

    environment:
      # Docker passes in only the GPU selected by device_ids above.
      # Inside the container it always appears as device 0, regardless of
      # which host GPU it is. Do not change this to match the host GPU ID.
      CUDA_VISIBLE_DEVICES: "0"
      # Bittensor wallet selection — must match what `btcli wallet list` shows.
      WALLET_NAME: ${WALLET_NAME:?set WALLET_NAME in .env}
      HOTKEY_NAME: ${HOTKEY_NAME:?set HOTKEY_NAME in .env}
      # Optional: Weights & Biases logging
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_MODE: ${WANDB_MODE:-online}
      # Hugging Face: token for gated datasets, cache on the bind-mounted
      # volume so model downloads survive Watchtower-triggered restarts.
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /data/hf
      TRANSFORMERS_CACHE: /data/hf

    volumes:
      # Wallets — read-only is safest; the validator only signs with the hotkey.
      - ${BITTENSOR_WALLET_PATH:-${HOME}/.bittensor/wallets}:/root/.bittensor/wallets:ro
      # Persistent state: checkpoints, expert groups, hf cache, wandb runs.
      # Defaults to the repo root, which already contains checkpoints/,
      # expert_groups/, wandb/, etc. Override with DATA_DIR in .env for
      # production hosts that want a path outside the repo.
      - ${DATA_DIR:-../../..}:/data
      # Validator config YAML — bind mount so you can edit on the host
      # without rebuilding the image.
      - ${CONFIG_PATH:?set CONFIG_PATH in .env}:/data/configs/validator.yaml
      # Expert group configs — shipped with the repo, mounted read-only so
      # the code can load them at /app/expert_groups/<group>/config.yaml.
      - ${EXPERT_GROUPS_PATH:-../../../expert_groups}:/app/expert_groups:ro

    command: ["--path", "/data/configs/validator.yaml"]

    # Surface a liveness signal via the Prometheus exporter on port 8200.
    # The /v1/state.json admin API was removed; aggregators read everything
    # from Prometheus + chain now (see connito/shared/telemetry.py).
    # Previous (10 s timeout, 5 retries) settings killed the container at the
    # first multi-minute /metrics rendering hiccup — see follow-up SIGTERM
    # handler in validator.run for diagnostics. Bumped to give 10 min of
    # headroom and added curl --max-time so the probe itself can't hang past
    # the docker timeout.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "30", "http://localhost:8200/metrics"]
      interval: 60s
      timeout: 60s
      retries: 10
      start_period: 300s

  watchtower:
    image: containrrr/watchtower:1.7.1
    # container_name: derived from COMPOSE_PROJECT_NAME
    restart: unless-stopped

    # Mount the docker socket so Watchtower can pull and recreate containers.
    # The GHCR image is public, so no registry auth is needed.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # Match the host Docker daemon API version (docker version → API version).
      DOCKER_API_VERSION: "1.44"
      # Only act on containers with the opt-in label above.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Poll every 5 minutes — tweak with WATCHTOWER_POLL_INTERVAL in .env.
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      # Remove the previous image so the host doesn't fill up after upgrades.
      WATCHTOWER_CLEANUP: "true"
      # Stop containers gracefully so the validator can flush state.
      WATCHTOWER_TIMEOUT: "120s"
      # Optional: notifications. Set WATCHTOWER_NOTIFICATIONS=slack and
      # WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL to get pinged on upgrades.
      WATCHTOWER_NOTIFICATIONS: ${WATCHTOWER_NOTIFICATIONS:-}
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: ${WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL:-}
      WATCHTOWER_NOTIFICATION_SLACK_IDENTIFIER: connito-validator
